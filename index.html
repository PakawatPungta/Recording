<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบพิมพ์ด้วยเสียง</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h3 {
            margin-top: 0;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin: 15px 0;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .btn-mic {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-mic.is-listening {
            background: #dc3545;
            animation: pulse 1.5s infinite;
        }

        .btn-send {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-send:hover {
            background: #218838;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        #status {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            min-height: 18px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3><i class="fa-solid fa-microphone-lines"></i> พูดหรือพิมพ์ข้อความ</h3>
        <div id="status">ระบบพร้อมใช้งาน</div>

        <button id="btn-mic" class="btn-mic"><i class="fa-solid fa-microphone"></i> กดเพื่อพูด</button>

        <textarea id="text-input" placeholder="พูดหรือพิมพ์ข้อความของคุณที่นี่..."></textarea>

        <button id="btn-send" class="btn-send"><i class="fa-solid fa-paper-plane"></i> ส่งข้อความ</button>
    </div>

    <script>
        const btnMic = document.getElementById('btn-mic');
        const btnSend = document.getElementById('btn-send');
        const textInput = document.getElementById('text-input');
        const statusText = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            statusText.innerText = "เบราว์เซอร์ไม่รองรับระบบเสียง";
            statusText.style.color = "red";
            btnMic.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'th-TH';
            recognition.interimResults = false;

            btnMic.addEventListener('click', () => {
                try {
                    recognition.start();
                    btnMic.classList.add('is-listening');
                    btnMic.innerHTML = '<i class="fa-solid fa-ear-listen"></i> กำลังฟัง...';
                    statusText.innerText = "พูดประโยคของคุณได้เลย";
                    statusText.style.color = "#007bff";
                } catch (e) {
                    statusText.innerText = "ข้อผิดพลาด: " + e.message;
                }
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;

                // นำข้อความที่ได้ยิน มาเติมต่อท้ายข้อความเดิมที่มีอยู่ในกล่อง
                const currentText = textInput.value.trim();
                textInput.value = currentText ? currentText + " " + transcript : transcript;

                statusText.innerText = "วิเคราะห์เสียงสำเร็จ (แก้ไขข้อความได้)";
                statusText.style.color = "#28a745";
            };

            recognition.onerror = (event) => {
                statusText.innerText = "ข้อผิดพลาด: " + (event.error === 'not-allowed' ? 'ไม่ได้รับอนุญาตให้ใช้ไมค์' : event.error);
                statusText.style.color = "red";
            };

            recognition.onend = () => {
                btnMic.classList.remove('is-listening');
                btnMic.innerHTML = '<i class="fa-solid fa-microphone"></i> กดเพื่อพูดใหม่';
            };
        }

        // เมื่อกดปุ่ม "ส่งข้อความ"
        btnSend.addEventListener('click', () => {
            const finalMsg = textInput.value.trim();
            if (window.opener) {
                // ส่งข้อความกลับไปหา Apps Script
                window.opener.postMessage({ type: "VOICE_TEXT", text: finalMsg }, "*");
                window.close(); // ปิดหน้าต่างตัวเอง
            } else {
                statusText.innerText = "ไม่พบหน้าต่างหลักสำหรับส่งข้อมูลกลับ";
                statusText.style.color = "red";
            }
        });
    </script>
</body>

</html>
